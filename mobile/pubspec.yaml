name: vaultguard
description: "VaultGuard - Secure Mobile Password Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # API & Network
  dio: ^5.7.0

  # Storage & Security
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # Utilities & Helpers
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  logger: ^2.4.0

  # UI / UX Design
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.1.14+1
  fluttertoast: ^8.2.8
  animations: ^2.0.11
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  open_file_plus: ^3.4.1+1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
